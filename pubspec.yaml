name: smart_glasses
description: "Smart Glasses Assistance System - Flutter Android app for ESP32-CAM integration (dummy/production-ready shell)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # Persistence for settings
  shared_preferences: ^2.3.3

  # Camera (mobile preview now; replace with ESP32 stream later)
  camera: ^0.11.0+2
  # Runtime permission for camera (Android)
  permission_handler: ^11.3.1
  # TensorFlow Lite (ML)
  tflite_flutter: ^0.12.1
  # Text-to-speech
  flutter_tts: ^4.2.5
  # Image decoding / resizing for ML
  image: ^3.3.0
  webview_flutter: ^4.13.1
  http: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/best_int8.tflite
    - assets/models/labels.txt
